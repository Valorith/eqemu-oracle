name: Refresh EQEmu Oracle Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-eqemu-oracle-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Refresh committed data
        run: python ./plugins/eqemu-oracle/scripts/eqemu_oracle.py refresh --scope all --mode committed

      - name: Run tests
        run: python -m unittest discover -s ./plugins/eqemu-oracle/tests

      - name: Detect data changes
        id: changes
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- plugins/eqemu-oracle/data)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push refreshed data
        if: steps.changes.outputs.has_changes == 'true'
        env:
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/eqemu-oracle/data
          git commit -m "Refresh EQEmu Oracle data"
          git pull --rebase origin "$TARGET_BRANCH"
          git push origin "HEAD:$TARGET_BRANCH"
